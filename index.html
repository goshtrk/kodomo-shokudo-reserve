<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>こども食堂 予約フォーム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #f97316; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status-card { transition: all 0.2s ease-in-out; }
        input[type="date"] { -webkit-appearance: none; appearance: none; min-height: 3rem; background-color: #f9fafb; }
    </style>
</head>
<body class="bg-orange-50 text-gray-800 font-sans">

    <div class="max-w-md mx-auto p-4 pb-12">
        <header class="text-center py-6">
            <h1 class="text-2xl font-bold text-orange-600">こども食堂 予約</h1>
            <p class="text-sm text-gray-500 mt-2">お食事される方全員のお名前を入力してください</p>
        </header>

        <form id="reservation-form" class="space-y-6" novalidate>
            
            <section class="bg-white p-4 rounded-xl shadow-sm border border-orange-100">
                <label class="block font-bold mb-3 text-sm text-gray-700">ご利用形態 <span class="text-red-500 text-xs">必須</span></label>
                <div class="grid grid-cols-2 gap-4">
                    <label class="status-card flex items-center justify-center p-4 border-2 rounded-lg cursor-pointer border-gray-100 bg-gray-50 text-gray-600" id="label-child-only">
                        <input type="radio" name="attendance-type" value="子供のみ" class="hidden" onclick="updateAttendanceUI('child')">
                        <span class="text-sm font-bold">子供のみ</span>
                    </label>
                    <label class="status-card flex items-center justify-center p-4 border-2 rounded-lg cursor-pointer border-gray-100 bg-gray-50 text-gray-600" id="label-with-guardian">
                        <input type="radio" name="attendance-type" value="保護者同伴" class="hidden" onclick="updateAttendanceUI('guardian')">
                        <span class="text-sm font-bold">保護者同伴</span>
                    </label>
                </div>
            </section>

            <section class="bg-white p-4 rounded-xl shadow-sm border border-orange-100">
                <label class="block font-bold mb-2 text-sm text-gray-700">参加希望日 <span class="text-red-500 text-xs">必須</span></label>
                <input type="date" id="event-date" name="event-date" required
                    class="w-full block border-2 border-gray-100 rounded-lg p-3 text-base focus:ring-2 focus:ring-orange-500 outline-none box-border"
                    onchange="updateMonthLabel()">
            </section>

            <section class="bg-white p-4 rounded-xl shadow-sm border border-orange-100">
                <label class="block font-bold mb-2 text-sm text-gray-700">
                    <span id="month-display">--</span>月の参加回数を教えてください <span class="text-red-500 text-xs">必須</span>
                </label>
                <div class="relative">
                    <select id="visit-count" name="visit-count" class="w-full border-2 border-gray-100 rounded-lg p-3 bg-gray-50 text-base focus:ring-2 focus:ring-orange-500 outline-none appearance-none">
                        <option value="">選択してください</option>
                        <script>
                            const labels = ["初めて", "2回目", "3回目", "4回目"];
                            labels.forEach((label, index) => {
                                document.write(`<option value="${index + 1}">${label}</option>`);
                            });
                        </script>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500">
                        <svg class="fill-current h-4 w-4" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                    </div>
                </div>
            </section>

            <div id="children-section" class="space-y-4">
                <h2 class="font-bold text-lg px-1 text-gray-700">お食事されるお子さん</h2>
                <div id="children-container" class="space-y-4">
                    </div>
                <button type="button" onclick="addPersonField('children')"
                    class="w-full py-3 border-2 border-dashed border-orange-300 text-orange-500 rounded-xl font-bold hover:bg-orange-100 transition shadow-sm bg-white active:bg-orange-50">
                    ＋ お子さんを追加する
                </button>
            </div>

            <div id="guardians-section" class="space-y-4 hidden">
                <div>
                    <h2 class="font-bold text-lg px-1 text-gray-700">お食事される保護者</h2>
                    <p class="text-[11px] text-orange-600 px-1 mt-1 leading-relaxed">
                        ※保護者の方でご試食を希望される場合は、こちらにお名前をお願いします（初回限定でのご提供となります）。
                    </p>
                </div>
                <div id="guardians-container" class="space-y-4">
                    </div>
                <button type="button" onclick="addPersonField('guardians')"
                    class="w-full py-3 border-2 border-dashed border-orange-300 text-orange-500 rounded-xl font-bold hover:bg-orange-100 transition shadow-sm bg-white active:bg-orange-50">
                    ＋ 保護者を追加する
                </button>
            </div>

            <section class="bg-white p-4 rounded-xl shadow-sm border border-orange-100">
                <label class="block font-bold mb-2 text-sm text-gray-700">
                    緊急連絡先 <span id="phone-required-label" class="text-red-500 text-xs hidden">必須</span>
                </label>
                <input type="tel" id="emergency-phone" name="emergency-phone" 
                    placeholder="09012345678"
                    inputmode="numeric"
                    class="w-full border-2 border-gray-100 rounded-lg p-3 bg-gray-50 text-base focus:ring-2 focus:ring-orange-500 outline-none">
                <p class="text-[10px] text-gray-400 mt-2">※数字のみ10〜11桁で入力してください。</p>
            </section>

            <div class="pt-4 px-2">
                <button type="submit" id="submit-btn"
                    class="w-full bg-orange-500 text-white font-bold py-4 rounded-full shadow-lg hover:bg-orange-600 active:scale-95 transition-all text-lg">
                    予約を申し込む
                </button>
            </div>
        </form>

        <div id="loading-overlay" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50">
            <div class="bg-white p-8 rounded-2xl flex flex-col items-center shadow-2xl">
                <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-100 h-12 w-12 mb-4"></div>
                <p class="font-bold text-orange-600" id="loading-text">送信中...</p>
            </div>
        </div>
    </div>

    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <script>
        const LIFF_ID = '2009787140-kljUQCNo'; 
        const GAS_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbxIxyxE-cx_Mu120qwkGIjzePB1L6bIRC0-3tWWFeEGBnd1MPAwE1SPuhLuUAGhLNQ/exec'; 
        const IS_DEBUG = false; 

        async function initializeLiff() {
            if (IS_DEBUG) return;
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); }
            } catch (error) {
                console.error("LIFF初期化失敗", error);
            }
        }

        function updateAttendanceUI(type) {
            const lChild = document.getElementById('label-child-only');
            const lGuardian = document.getElementById('label-with-guardian');
            const phoneLabel = document.getElementById('phone-required-label');
            const guardianSection = document.getElementById('guardians-section');
            
            [lChild, lGuardian].forEach(el => el.className = 'status-card flex items-center justify-center p-4 border-2 rounded-lg cursor-pointer border-gray-100 bg-gray-50 text-gray-600');
            
            if (type === 'child') {
                lChild.className = 'status-card flex items-center justify-center p-4 border-2 rounded-lg cursor-pointer border-orange-500 bg-orange-100 shadow-inner text-orange-600';
                phoneLabel.classList.remove('hidden');
                guardianSection.classList.add('hidden');
                document.getElementById('guardians-container').innerHTML = ''; // クリア
            } else {
                lGuardian.className = 'status-card flex items-center justify-center p-4 border-2 rounded-lg cursor-pointer border-orange-500 bg-orange-100 shadow-inner text-orange-600';
                phoneLabel.classList.add('hidden');
                guardianSection.classList.remove('hidden');
                // 「初期表示はボタンのみ」なので、ここでは入力枠を追加しない
            }
        }

        function updateMonthLabel() {
            const dateVal = document.getElementById('event-date').value;
            if (dateVal) {
                const month = new Date(dateVal).getMonth() + 1;
                document.getElementById('month-display').innerText = month;
            }
        }

        function addPersonField(type) {
            const container = document.getElementById(`${type}-container`);
            const label = type === 'children' ? 'お子さん' : '保護者';
            const index = container.children.length + 1;
            
            const html = `
                <div class="person-group bg-white p-5 rounded-xl shadow-sm border border-orange-100 relative">
                    <div class="flex justify-between items-center mb-4">
                        <span class="bg-orange-500 text-white text-[10px] px-2 py-0.5 rounded-full font-bold">${label} ${index}</span>
                        ${index > 1 || type === 'guardians' ? `<button type="button" onclick="this.parentElement.parentElement.remove()" class="text-gray-400 text-xs">✕ 削除</button>` : ''}
                    </div>
                    <div class="space-y-4">
                        <input type="text" name="${type}-name" placeholder="お名前" required class="w-full border-b-2 border-gray-100 p-2 outline-none focus:border-orange-400 text-base">
                        <input type="text" name="${type}-note" placeholder="備考（アレルギー等）" class="w-full border-b border-gray-100 p-2 text-sm outline-none focus:border-orange-300">
                    </div>
                </div>`;
            container.insertAdjacentHTML('beforeend', html);
        }

        document.getElementById('reservation-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const attendanceType = document.querySelector('input[name="attendance-type"]:checked');
            const eventDate = document.getElementById('event-date').value;
            const visitCount = document.getElementById('visit-count').value;
            const phone = document.getElementById('emergency-phone').value.trim();

            const collectData = (type) => {
                const results = [];
                const names = document.getElementsByName(`${type}-name`);
                const notes = document.getElementsByName(`${type}-note`);
                for (let i = 0; i < names.length; i++) {
                    const name = names[i].value.trim();
                    if (name) {
                        results.push({ name, note: notes[i].value.trim() });
                    }
                }
                return results;
            };

            const children = collectData('children');
            const guardians = collectData('guardians');

            if (!attendanceType || !eventDate || visitCount === "" || children.length === 0) {
                alert("未入力の項目があります（お子さんは1名以上入力してください）。");
                return;
            }

            const phoneRegex = /^\d{10,11}$/;
            if (phone !== "" && !phoneRegex.test(phone)) {
                alert("電話番号はハイフンなしの数字のみで入力してください。");
                return;
            }

            if (attendanceType.value === "子供のみ" && !phone) {
                alert("「子供のみ」参加の場合は、緊急連絡先が必須です。");
                return;
            }

            document.getElementById('loading-overlay').classList.remove('hidden');

            try {
                let profile = { userId: "DEBUG_LINE_ID", displayName: "テストユーザー" };
                if (!IS_DEBUG) profile = await liff.getProfile();

                const payload = {
                    lineId: profile.userId,
                    displayName: profile.displayName,
                    visitCount: visitCount,
                    emergencyPhone: phone,
                    eventDate: eventDate,
                    attendanceType: attendanceType.value,
                    children: children,
                    guardians: guardians
                };

                if (IS_DEBUG) {
                    console.log("JSON:", payload);
                    setTimeout(() => {
                        document.getElementById('loading-overlay').classList.add('hidden');
                        alert("デバッグ送信完了");
                    }, 800);
                    return;
                }

                await fetch(GAS_WEBAPP_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                });

                if (liff.isInClient()) {
                    const childSummary = payload.children.map(p => `・${p.name}(子)`).join('\n');
                    const guardianSummary = payload.guardians.length > 0 
                        ? '\n' + payload.guardians.map(p => `・${p.name}(保護者)`).join('\n') 
                        : '';
                    
                    const text = 
`【予約リクエスト送信】
希望日：${payload.eventDate}
形態：${payload.attendanceType}
参加回数：${payload.visitCount}回
緊急連絡先：${payload.emergencyPhone || 'なし'}

参加者：
${childSummary}${guardianSummary}

※このメッセージは自動送信されています。`;
                    await liff.sendMessages([{ type: 'text', text: text }]);
                }

                document.getElementById('loading-text').innerText = "送信完了！";
                setTimeout(() => { liff.closeWindow(); }, 1500);

            } catch (error) {
                alert("送信に失敗しました");
                document.getElementById('loading-overlay').classList.add('hidden');
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            initializeLiff();
            addPersonField('children'); // お子さんは最初から1件表示
        });
    </script>
</body>
</html>
