<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>こども食堂 予約フォーム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #f97316; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status-card { transition: all 0.2s ease-in-out; }
    </style>
</head>
<body class="bg-orange-50 text-gray-800 font-sans">

    <div class="max-w-md mx-auto p-4 pb-12">
        <header class="text-center py-6">
            <h1 class="text-2xl font-bold text-orange-600">こども食堂 予約</h1>
            <p class="text-sm text-gray-500 mt-2">参加する方全員のお名前を入力してください</p>
        </header>

        <form id="reservation-form" class="space-y-6" novalidate>
            
            <section class="bg-white p-4 rounded-xl shadow-sm border border-orange-100">
                <label class="block font-bold mb-3 text-sm">ご利用は初めてですか？ <span class="text-red-500 text-xs">必須</span></label>
                <div class="grid grid-cols-2 gap-4">
                    <label class="status-card flex items-center justify-center p-4 border-2 rounded-lg cursor-pointer border-gray-100 bg-gray-50" id="label-new">
                        <input type="radio" name="user-status" value="初めて" class="hidden" onclick="updateStatusUI('new')">
                        <span class="text-sm font-bold text-gray-600">初めて</span>
                    </label>
                    <label class="status-card flex items-center justify-center p-4 border-2 rounded-lg cursor-pointer border-gray-100 bg-gray-50" id="label-existing">
                        <input type="radio" name="user-status" value="2回目以降" class="hidden" onclick="updateStatusUI('existing')">
                        <span class="text-sm font-bold text-gray-600">2回目以降</span>
                    </label>
                </div>
                <p id="status-error" class="text-red-500 text-xs mt-3 hidden text-center font-bold">※選択してください</p>
            </section>

            <section class="bg-white p-4 rounded-xl shadow-sm border border-orange-100">
                <label class="block font-bold mb-2 text-sm">参加希望日 <span class="text-red-500 text-xs">必須</span></label>
                <input type="date" id="event-date" name="event-date" required
                    class="w-full border-gray-200 rounded-lg p-3 bg-gray-50 focus:ring-2 focus:ring-orange-500 outline-none">
            </section>

            <div id="participants-container" class="space-y-4">
                <h2 class="font-bold text-lg px-1 text-gray-700">参加する方のお名前</h2>
            </div>

            <button type="button" id="add-participant-btn"
                class="w-full py-3 border-2 border-dashed border-orange-300 text-orange-500 rounded-xl font-bold hover:bg-orange-100 transition shadow-sm bg-white">
                ＋ 参加者を追加する
            </button>

            <div class="pt-4 px-2">
                <button type="submit" id="submit-btn"
                    class="w-full bg-orange-500 text-white font-bold py-4 rounded-full shadow-lg hover:bg-orange-600 active:scale-95 transition-all text-lg disabled:bg-gray-400">
                    予約を申し込む
                </button>
            </div>
        </form>

        <div id="loading-overlay" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50">
            <div class="bg-white p-8 rounded-2xl flex flex-col items-center shadow-2xl">
                <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-100 h-12 w-12 mb-4"></div>
                <p class="font-bold text-orange-600" id="loading-text">送信中...</p>
            </div>
        </div>
    </div>

    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <script>
        // ==========================================
        // 設定エリア
        // ==========================================
        const LIFF_ID = '2009787140-kljUQCNo'; 
        const GAS_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbxIxyxE-cx_Mu120qwkGIjzePB1L6bIRC0-3tWWFeEGBnd1MPAwE1SPuhLuUAGhLNQ/exec'; 
        
        // ★デバッグモード設定
        // true: ローカルブラウザ用（LINE ID取得やPOST送信をスキップしてConsole表示）
        // false: 本番用（LINE IDを取得して実際にGASへ送信）
        const IS_DEBUG = false; 

        // ==========================================
        // 初期化処理
        // ==========================================
        async function initializeLiff() {
            if (IS_DEBUG) {
                console.log("Debug Mode: LIFF initialization skipped.");
                return;
            }
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); }
            } catch (error) {
                console.error("LIFF初期化失敗", error);
            }
        }

        // ==========================================
        // UI制御
        // ==========================================
        function updateStatusUI(type) {
            const lNew = document.getElementById('label-new');
            const lExt = document.getElementById('label-existing');
            document.getElementById('status-error').classList.add('hidden');
            
            [lNew, lExt].forEach(el => el.className = 'status-card flex items-center justify-center p-4 border-2 rounded-lg cursor-pointer border-gray-100 bg-gray-50');
            
            const target = type === 'new' ? lNew : lExt;
            target.className = 'status-card flex items-center justify-center p-4 border-2 rounded-lg cursor-pointer border-orange-500 bg-orange-100 shadow-inner';
        }

        function addParticipantField() {
            const container = document.getElementById('participants-container');
            const index = container.querySelectorAll('.participant-group').length + 1;
            const html = `
                <div class="participant-group bg-white p-5 rounded-xl shadow-sm border border-orange-100 relative">
                    <div class="flex justify-between items-center mb-4">
                        <span class="bg-orange-500 text-white text-[10px] px-2 py-0.5 rounded-full font-bold">参加者 ${index}</span>
                        ${index > 1 ? `<button type="button" onclick="this.parentElement.parentElement.remove()" class="text-gray-400 text-xs">✕ 削除</button>` : ''}
                    </div>
                    <div class="space-y-4">
                        <input type="text" name="p-name" placeholder="お名前" required class="w-full border-b-2 border-gray-100 p-2 outline-none focus:border-orange-400 text-base">
                        <div class="flex gap-8 px-1">
                            <label class="flex items-center space-x-3 cursor-pointer"><input type="radio" name="p-type-${index}" value="子供" checked class="w-5 h-5 text-orange-500"><span>子供</span></label>
                            <label class="flex items-center space-x-3 cursor-pointer"><input type="radio" name="p-type-${index}" value="大人" class="w-5 h-5 text-orange-500"><span>大人</span></label>
                        </div>
                        <input type="text" name="p-note" placeholder="備考（アレルギー等）" class="w-full border-b border-gray-100 p-2 text-sm outline-none focus:border-orange-300">
                    </div>
                </div>`;
            container.insertAdjacentHTML('beforeend', html);
        }

        // ==========================================
        // 送信処理
        // ==========================================
        document.getElementById('reservation-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const statusChecked = document.querySelector('input[name="user-status"]:checked');
            const eventDate = document.getElementById('event-date').value;
            
            if (!statusChecked || !eventDate) {
                alert("必須項目（利用区分・日付）を入力してください");
                return;
            }

            document.getElementById('loading-overlay').classList.remove('hidden');

            try {
                // デバッグ時はダミー、本番は実プロファイルを取得
                let profile = { userId: "DEBUG_LINE_ID", displayName: "テストユーザー" };
                if (!IS_DEBUG) {
                    profile = await liff.getProfile();
                }

                // 送信データの組み立て
                const payload = {
                    lineId: profile.userId,
                    displayName: profile.displayName,
                    userStatus: statusChecked.value,
                    eventDate: eventDate,
                    participants: [] // 全体の備考欄は廃止（または任意）
                };

                document.querySelectorAll('.participant-group').forEach((group, i) => {
                    const nameInput = group.querySelector('input[name="p-name"]');
                    if (nameInput.value.trim() !== "") {
                        const category = group.querySelector(`input[name="p-type-${i+1}"]:checked`).value;
                        const note = group.querySelector('input[name="p-note"]').value; // 個別備考を取得
                        payload.participants.push({ 
                            name: nameInput.value, 
                            category: category,
                            note: note // JSONに追加
                        });
                    }
                });

                // デバッグ用出力
                console.log("--- 組み立てられたJSON ---");
                console.log(JSON.stringify(payload, null, 2));

                if (IS_DEBUG) {
                    setTimeout(() => {
                        document.getElementById('loading-overlay').classList.add('hidden');
                        alert("【デバッグ】コンソールにJSONを出力しました。GASへの送信はスキップします。");
                    }, 800);
                    return;
                }

                // GASへPOST
                await fetch(GAS_WEBAPP_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                });

                if (liff.isInClient()) {
                    const participantSummary = payload.participants.map((p, index) => {
                        const baseLine = `・参加者${index + 1}：${p.name}（${p.category}）`;
                        const noteLine = p.note ? `\n　備考：${p.note}` : `\n　備考：なし`;
                        return `${baseLine}${noteLine}`;
                    }).join('\n');

                    // 送信メッセージの組み立て
                    const messageText = 
`【予約リクエスト送信】
希望日：${payload.eventDate}
利用区分：${payload.userStatus}
予約人数：${payload.participants.length}名
内容：
${participantSummary}

※このメッセージは自動送信されています。`;

                    try {
                        await liff.sendMessages([
                            {
                                type: 'text',
                                text: messageText
                            }
                        ]);
                        console.log("LINEメッセージ送信成功");
                    } catch (err) {
                        console.error("LINEメッセージ送信失敗", err);
                        // メッセージ送信に失敗しても、GASへの登録は完了しているので続行します
                    }
                }

                document.getElementById('loading-text').innerText = "送信完了！";
                setTimeout(() => { liff.closeWindow(); }, 1500);

            } catch (error) {
                console.error("送信エラー:", error);
                alert("エラーが発生しました。コンソールを確認してください。");
                document.getElementById('loading-overlay').classList.add('hidden');
            }
        });

        // 起動時
        document.addEventListener('DOMContentLoaded', () => {
            initializeLiff();
            addParticipantField();
        });
        document.getElementById('add-participant-btn').addEventListener('click', addParticipantField);
    </script>
</body>
</html>
