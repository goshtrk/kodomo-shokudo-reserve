<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>こども食堂 予約フォーム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #f97316; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status-card { transition: all 0.2s ease-in-out; }
    </style>
</head>
<body class="bg-orange-50 text-gray-800 font-sans">

    <div class="max-w-md mx-auto p-4 pb-12">
        <header class="text-center py-6">
            <h1 class="text-2xl font-bold text-orange-600">こども食堂 予約</h1>
            <p class="text-sm text-gray-500 mt-2">参加する方全員のお名前を入力してください</p>
        </header>

        <form id="reservation-form" class="space-y-6" novalidate>
            
            <section class="bg-white p-4 rounded-xl shadow-sm border border-orange-100">
                <label class="block font-bold mb-3 text-sm">お子さんのみのご利用ですか？ <span class="text-red-500 text-xs">必須</span></label>
                <div class="grid grid-cols-2 gap-4">
                    <label class="status-card flex items-center justify-center p-4 border-2 rounded-lg cursor-pointer border-gray-100 bg-gray-50" id="label-child-only">
                        <input type="radio" name="attendance-type" value="子供のみ" class="hidden" onclick="updateAttendanceUI('child')">
                        <span class="text-sm font-bold">子供のみ</span>
                    </label>
                    <label class="status-card flex items-center justify-center p-4 border-2 rounded-lg cursor-pointer border-gray-100 bg-gray-50" id="label-with-guardian">
                        <input type="radio" name="attendance-type" value="保護者同伴" class="hidden" onclick="updateAttendanceUI('guardian')">
                        <span class="text-sm font-bold">保護者同伴</span>
                    </label>
                </div>
            </section>

            <section class="bg-white p-4 rounded-xl shadow-sm border border-orange-100">
                <label class="block font-bold mb-2 text-sm">参加希望日 <span class="text-red-500 text-xs">必須</span></label>
                <input type="date" id="event-date" name="event-date" required
                    class="w-full border-gray-200 rounded-lg p-3 bg-gray-50 focus:ring-2 focus:ring-orange-500 outline-none"
                    onchange="updateMonthLabel()">
            </section>

            <section class="bg-white p-4 rounded-xl shadow-sm border border-orange-100">
                <label class="block font-bold mb-2 text-sm">
                    <span id="month-display">--</span>月の参加回数を教えてください <span class="text-red-500 text-xs">必須</span>
                </label>
                <select id="visit-count" name="visit-count" class="w-full border-gray-200 rounded-lg p-3 bg-gray-50 focus:ring-2 focus:ring-orange-500 outline-none">
                    <option value="">選択してください</option>
                    <script>
                        for(let i=0; i<=10; i++) {
                            document.write(`<option value="${i}">${i} 回</option>`);
                        }
                    </script>
                </select>
            </section>

            <div id="participants-container" class="space-y-4">
                <h2 class="font-bold text-lg px-1 text-gray-700">参加する方のお名前</h2>
            </div>

            <button type="button" id="add-participant-btn"
                class="w-full py-3 border-2 border-dashed border-orange-300 text-orange-500 rounded-xl font-bold hover:bg-orange-100 transition shadow-sm bg-white">
                ＋ 参加者を追加する
            </button>

            <section class="bg-white p-4 rounded-xl shadow-sm border border-orange-100">
                <label class="block font-bold mb-2 text-sm">
                    緊急連絡先 <span id="phone-required-label" class="text-red-500 text-xs hidden">必須</span>
                </label>
                <input type="tel" id="emergency-phone" name="emergency-phone" placeholder="09012345678"
                    class="w-full border-gray-200 rounded-lg p-3 bg-gray-50 focus:ring-2 focus:ring-orange-500 outline-none">
                <p class="text-[10px] text-gray-400 mt-2">※子供のみ参加の場合は必ず入力してください。</p>
            </section>

            <div class="pt-4 px-2">
                <button type="submit" id="submit-btn"
                    class="w-full bg-orange-500 text-white font-bold py-4 rounded-full shadow-lg hover:bg-orange-600 active:scale-95 transition-all text-lg">
                    予約を申し込む
                </button>
            </div>
        </form>

        <div id="loading-overlay" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50">
            <div class="bg-white p-8 rounded-2xl flex flex-col items-center shadow-2xl">
                <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-100 h-12 w-12 mb-4"></div>
                <p class="font-bold text-orange-600" id="loading-text">送信中...</p>
            </div>
        </div>
    </div>

    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <script>
        // ==========================================
        // 設定エリア
        // ==========================================
        const LIFF_ID = '2009787140-kljUQCNo'; 
        const GAS_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbxIxyxE-cx_Mu120qwkGIjzePB1L6bIRC0-3tWWFeEGBnd1MPAwE1SPuhLuUAGhLNQ/exec'; 
        const IS_DEBUG = true; 

        // ==========================================
        // UI制御
        // ==========================================
        async function initializeLiff() {
            if (IS_DEBUG) return;
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); }
            } catch (error) {
                console.error("LIFF初期化失敗", error);
            }
        }

        function updateAttendanceUI(type) {
            const lChild = document.getElementById('label-child-only');
            const lGuardian = document.getElementById('label-with-guardian');
            const phoneLabel = document.getElementById('phone-required-label');
            
            [lChild, lGuardian].forEach(el => el.className = 'status-card flex items-center justify-center p-4 border-2 rounded-lg cursor-pointer border-gray-100 bg-gray-50 text-gray-600');
            
            if (type === 'child') {
                lChild.className = 'status-card flex items-center justify-center p-4 border-2 rounded-lg cursor-pointer border-orange-500 bg-orange-100 shadow-inner text-orange-600';
                phoneLabel.classList.remove('hidden');
            } else {
                lGuardian.className = 'status-card flex items-center justify-center p-4 border-2 rounded-lg cursor-pointer border-orange-500 bg-orange-100 shadow-inner text-orange-600';
                phoneLabel.classList.add('hidden');
            }
        }

        function updateMonthLabel() {
            const dateVal = document.getElementById('event-date').value;
            if (dateVal) {
                const month = new Date(dateVal).getMonth() + 1;
                document.getElementById('month-display').innerText = month;
            }
        }

        function addParticipantField() {
            const container = document.getElementById('participants-container');
            const index = container.querySelectorAll('.participant-group').length + 1;
            const html = `
                <div class="participant-group bg-white p-5 rounded-xl shadow-sm border border-orange-100 relative">
                    <div class="flex justify-between items-center mb-4">
                        <span class="bg-orange-500 text-white text-[10px] px-2 py-0.5 rounded-full font-bold">参加者 ${index}</span>
                        ${index > 1 ? `<button type="button" onclick="this.parentElement.parentElement.remove()" class="text-gray-400 text-xs">✕ 削除</button>` : ''}
                    </div>
                    <div class="space-y-4">
                        <input type="text" name="p-name" placeholder="お名前" required class="w-full border-b-2 border-gray-100 p-2 outline-none focus:border-orange-400 text-base">
                        <div class="flex gap-8 px-1">
                            <label class="flex items-center space-x-3 cursor-pointer"><input type="radio" name="p-type-${index}" value="子供" checked class="w-5 h-5 text-orange-500"><span>子供</span></label>
                            <label class="flex items-center space-x-3 cursor-pointer"><input type="radio" name="p-type-${index}" value="大人" class="w-5 h-5 text-orange-500"><span>大人</span></label>
                        </div>
                        <input type="text" name="p-note" placeholder="備考（アレルギー等）" class="w-full border-b border-gray-100 p-2 text-sm outline-none focus:border-orange-300">
                    </div>
                </div>`;
            container.insertAdjacentHTML('beforeend', html);
        }

        // ==========================================
        // 送信処理
        // ==========================================
        document.getElementById('reservation-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            // 1. 入力値の取得
            const attendanceType = document.querySelector('input[name="attendance-type"]:checked');
            const eventDate = document.getElementById('event-date').value;
            const visitCount = document.getElementById('visit-count').value;
            const phone = document.getElementById('emergency-phone').value.trim();

            // 2. 参加者データの収集と大人人数のカウント
            const participants = [];
            let adultCount = 0;
            document.querySelectorAll('.participant-group').forEach((group, i) => {
                const nameInput = group.querySelector('input[name="p-name"]');
                const name = nameInput.value.trim();
                if (name !== "") {
                    const category = group.querySelector(`input[name="p-type-${i+1}"]:checked`).value;
                    const note = group.querySelector('input[name="p-note"]').value;
                    if (category === "大人") adultCount++;
                    participants.push({ name, category, note });
                }
            });

            // 3. バリデーション
            if (!attendanceType || !eventDate || visitCount === "" || participants.length === 0) {
                alert("必須項目（ご利用形態・日付・参加回数・参加者名）を正しく入力してください");
                return;
            }

            // 子供のみ選択時：電話番号必須 ＆ 大人がいたらダメ
            if (attendanceType.value === "子供のみ") {
                if (!phone) {
                    alert("「子供のみ」で参加される場合は、緊急連絡先の入力が必須です");
                    return;
                }
                if (adultCount > 0) {
                    alert("「子供のみ」が選択されていますが、参加者に「大人」が含まれています。内容を確認してください。");
                    return;
                }
            }

            // 保護者同伴選択時：大人が1人もいないならダメ
            if (attendanceType.value === "保護者同伴" && adultCount === 0) {
                alert("「保護者同伴」が選択されています。参加者に「大人」を1名以上含めるか、「子供のみ」を選択してください。");
                return;
            }

            // 4. 送信処理
            document.getElementById('loading-overlay').classList.remove('hidden');

            try {
                let profile = { userId: "DEBUG_LINE_ID", displayName: "テストユーザー" };
                if (!IS_DEBUG) profile = await liff.getProfile();

                const payload = {
                    lineId: profile.userId,
                    displayName: profile.displayName,
                    userStatus: visitCount,
                    emergencyContactPhone: phone,
                    eventDate: eventDate.replace(/-/g, '/'),
                    attendanceType: attendanceType.value,
                    participants: participants
                };

                console.log("--- 送信JSON ---", JSON.stringify(payload, null, 2));

                if (IS_DEBUG) {
                    setTimeout(() => {
                        document.getElementById('loading-overlay').classList.add('hidden');
                        alert("【デバッグ】送信成功（コンソール確認）");
                    }, 800);
                    return;
                }

                await fetch(GAS_WEBAPP_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                });

                if (liff.isInClient()) {
                    const participantSummary = payload.participants.map(p => `・${p.name}（${p.category}）${p.note ? '：'+p.note : ''}`).join('\n');
                    const messageText = `【予約リクエスト送信】\n希望日：${payload.eventDate}\n形態：${payload.attendanceType}\n今月の参加：${payload.userStatus}回目\n緊急連絡先：${payload.emergencyContactPhone || 'なし'}\n\n参加者：\n${participantSummary}`;
                    await liff.sendMessages([{ type: 'text', text: messageText }]);
                }

                document.getElementById('loading-text').innerText = "送信完了！";
                setTimeout(() => { liff.closeWindow(); }, 1500);

            } catch (error) {
                console.error("送信エラー:", error);
                alert("送信に失敗しました。");
                document.getElementById('loading-overlay').classList.add('hidden');
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            initializeLiff();
            addParticipantField();
        });
        document.getElementById('add-participant-btn').addEventListener('click', addParticipantField);
    </script>
</body>
</html>
